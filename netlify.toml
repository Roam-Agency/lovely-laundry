[build]
  publish = "."

# Serverless functions (live pricing proxy). The pricing API key is read from
# the LL_API_PRICING_KEY environment variable inside the function and is never
# exposed to the browser.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Clean public path for the live pricing function.
[[redirects]]
  from = "/api/pricing"
  to = "/.netlify/functions/pricing"
  status = 200

# Common mistypes of the pricing page -> the real Pricing page, so they never
# land on a 404.
[[redirects]]
  from = "/prices"
  to = "/pricing.html"
  status = 301

[[redirects]]
  from = "/prices.html"
  to = "/pricing.html"
  status = 301

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 301

# Legacy path -> Visit Us page
[[redirects]]
  from = "/visit-store"
  to = "/visit.html"
  status = 301

# Convenience shortcut to the booking flow
[[redirects]]
  from = "/book"
  to = "https://ironing-man.co.uk/book"
  status = 302
  force = true

# Original source images are committed for reference only — not for public serving
[[redirects]]
  from = "/Images/*"
  to = "/index.html"
  status = 404

# CSS and JS keep stable filenames (no build-time hashing), so they must
# revalidate — otherwise "immutable" pins returning visitors to stale styles.
# Cache-busting is handled with a ?v= query on the <link>/<script> tags.
[[headers]]
  for = "/assets/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/main.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/pricing.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images and icons change rarely — cache for a week, but never "immutable".
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
